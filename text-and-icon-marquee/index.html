<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Text and Icon Marquee</title>

  <meta
    name="description"
    content="A responsive scrolling marquee that combines short text phrases with decorative icons."
  >

  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <main class="marquee-demo">

    <section
      class="text-icon-marquee"
      aria-label="Featured calls to action"
    >
      <div class="text-icon-marquee__track">

        <!-- Primary visible group -->
        <div class="text-icon-marquee__group">

          <span
            class="text-icon-marquee__icon"
            aria-hidden="true"
          >
            ×
          </span>

          <span class="text-icon-marquee__text">
            Shop The Drop
          </span>

          <span
            class="text-icon-marquee__icon"
            aria-hidden="true"
          >
            ×
          </span>

          <span class="text-icon-marquee__text">
            Join The Lobby
          </span>

          <span
            class="text-icon-marquee__icon"
            aria-hidden="true"
          >
            ×
          </span>

          <span class="text-icon-marquee__text">
            Clip It
          </span>

          <span
            class="text-icon-marquee__icon"
            aria-hidden="true"
          >
            ×
          </span>

          <span class="text-icon-marquee__text">
            Hot Takes Only
          </span>

          <span
            class="text-icon-marquee__icon"
            aria-hidden="true"
          >
            ×
          </span>

          <span class="text-icon-marquee__text">
            Watch The Stream
          </span>

        </div>

        <!-- Decorative duplicate for seamless looping -->
        <div
          class="text-icon-marquee__group"
          aria-hidden="true"
        >

          <span class="text-icon-marquee__icon">
            ×
          </span>

          <span class="text-icon-marquee__text">
            Shop The Drop
          </span>

          <span class="text-icon-marquee__icon">
            ×
          </span>

          <span class="text-icon-marquee__text">
            Join The Lobby
          </span>

          <span class="text-icon-marquee__icon">
            ×
          </span>

          <span class="text-icon-marquee__text">
            Clip It
          </span>

          <span class="text-icon-marquee__icon">
            ×
          </span>

          <span class="text-icon-marquee__text">
            Hot Takes Only
          </span>

          <span class="text-icon-marquee__icon">
            ×
          </span>

          <span class="text-icon-marquee__text">
            Watch The Stream
          </span>

        </div>

      </div>
    </section>

  </main>

</body>
</html>
