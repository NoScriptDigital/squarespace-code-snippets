<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Responsive Content Pills</title>

  <meta
    name="description"
    content="A responsive pill-style content group for organizing services, topics, methods, and feature labels in Squarespace."
  >

  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <main class="pill-demo">

    <section class="pill-section" aria-labelledby="pill-heading">

      <p class="pill-section__eyebrow">What We Combine</p>

      <h1 id="pill-heading" class="pill-section__title">
        A flexible pill layout for grouped content
      </h1>

      <div
        class="content-pills"
        aria-label="Topics included in the program"
      >
        <span class="content-pill">nervous system regulation</span>
        <span class="content-pill">habit building</span>
        <span class="content-pill">reflective coaching</span>
        <span class="content-pill">faith-centered growth</span>
        <span class="content-pill">mindset work</span>
        <span class="content-pill">movement and wellness practices</span>
        <span class="content-pill">intentional living</span>
      </div>

    </section>

  </main>

</body>
</html>
