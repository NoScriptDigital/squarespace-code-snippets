<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Text and Logo Marquee</title>

  <meta
    name="description"
    content="A responsive scrolling marquee that combines short text phrases with reusable logo or image separators."
  >

  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <main class="marquee-demo">

    <section
      class="text-logo-marquee"
      aria-label="Featured calls to action"
    >
      <div class="text-logo-marquee__track">

        <!-- Primary visible group -->
        <div class="text-logo-marquee__group">

          <img
            class="text-logo-marquee__logo"
            src="https://placehold.co/48x48?text=Logo"
            width="48"
            height="48"
            alt=""
            aria-hidden="true"
          >

          <span class="text-logo-marquee__text">Shop The Drop</span>

          <img
            class="text-logo-marquee__logo"
            src="https://placehold.co/48x48?text=Logo"
            width="48"
            height="48"
            alt=""
            aria-hidden="true"
          >

          <span class="text-logo-marquee__text">Join The Community</span>

          <img
            class="text-logo-marquee__logo"
            src="https://placehold.co/48x48?text=Logo"
            width="48"
            height="48"
            alt=""
            aria-hidden="true"
          >

          <span class="text-logo-marquee__text">Explore The Collection</span>

          <img
            class="text-logo-marquee__logo"
            src="https://placehold.co/48x48?text=Logo"
            width="48"
            height="48"
            alt=""
            aria-hidden="true"
          >

          <span class="text-logo-marquee__text">See What’s New</span>

          <img
            class="text-logo-marquee__logo"
            src="https://placehold.co/48x48?text=Logo"
            width="48"
            height="48"
            alt=""
            aria-hidden="true"
          >

          <span class="text-logo-marquee__text">Watch The Latest</span>

        </div>

        <!-- Decorative duplicate for seamless looping -->
        <div
          class="text-logo-marquee__group"
          aria-hidden="true"
        >

          <img
            class="text-logo-marquee__logo"
            src="https://placehold.co/48x48?text=Logo"
            width="48"
            height="48"
            alt=""
          >

          <span class="text-logo-marquee__text">Shop The Drop</span>

          <img
            class="text-logo-marquee__logo"
            src="https://placehold.co/48x48?text=Logo"
            width="48"
            height="48"
            alt=""
          >

          <span class="text-logo-marquee__text">Join The Community</span>

          <img
            class="text-logo-marquee__logo"
            src="https://placehold.co/48x48?text=Logo"
            width="48"
            height="48"
            alt=""
          >

          <span class="text-logo-marquee__text">Explore The Collection</span>

          <img
            class="text-logo-marquee__logo"
            src="https://placehold.co/48x48?text=Logo"
            width="48"
            height="48"
            alt=""
          >

          <span class="text-logo-marquee__text">See What’s New</span>

          <img
            class="text-logo-marquee__logo"
            src="https://placehold.co/48x48?text=Logo"
            width="48"
            height="48"
            alt=""
          >

          <span class="text-logo-marquee__text">Watch The Latest</span>

        </div>

      </div>
    </section>

  </main>

</body>
</html>
